<!DOCTYPE html>
<html>
<head>
    <title>Color Objects</title>
    <style>
        body {
            background-color: rgb(200,100,50); 
        }
        .color-box {
            border: 2px solid #000;
            padding: 20px;
            margin: 10px;
            display: inline-block;
        }
        .pink {
            background-color: rgb(50,255,255);
            
        }
        .blue {
            background-color: rgb(0,0,200);
        }
        .gray {
            background-color: rgb(100,100,100);
        }
        .brown {
            background-color: rgb(200,100,0); 
        }
        .blacky {
            background-color: rgb(0,0,0);
        }
    </style>
</head>
<body>
    <div class="color-box pink"> Schönes Pink</div>
    <div class="color-box blue">Kühles Blau</div>
    <div class="color-box gray">Dunkles Grau</div>
    <div class="color-box brown">Kaka</div>
    <div class="color-box blackyk">Blackyblackblack</div>
</body>
</html>
