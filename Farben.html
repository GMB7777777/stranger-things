<!DOCTYPE html>
<html>
<head>
    <title>Color Objects</title>
    <style>
        body {
            background-color: #FF0000; /* Red background */
        }
        .color-box {
            border: 2px solid #000;
            padding: 20px;
            margin: 10px;
            display: inline-block;
        }
        .pink {
            background-color: #FF69B4; /* Beautiful Pink */
            
        }
        .blue {
            background-color: #4DA6FF; /* Cool Blue */
        }
        .gray {
            background-color: #2C2C2C; /* Dark Gray */
        }
        .brown {
            background-color: #6B4423; /* Chocolate Brown */
        }
    </style>
</head>
<body>
    <div class="color-box pink">Beautiful Pink</div>
    <div class="color-box blue">Cool Blue</div>
    <div class="color-box gray">Dark Gray</div>
    <div class="color-box brown">Chocolate Brown</div>
</body>
</html>
