<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Human Benchmark Game</title>
    <style>
        body { font-family: Arial, sans-serif; }
        h1 { text-align: center; }
        #game { text-align: center; }
        #startBtn { padding: 10px 20px; font-size: 20px; }
    </style>
    <script>
        let startTime, endTime;
        function startReactionTest() {
            const delay = Math.floor(Math.random() * 5000) + 1000;
            setTimeout(() => {
                const reactionDiv = document.getElementById('reactionTime');
                reactionDiv.style.display = 'block';
                startTime = new Date();
                reactionDiv.textContent = 'Click now!';
            }, delay);
        }
        function recordReaction() {
            endTime = new Date();
            const reactionTime = endTime - startTime;
            alert(`Your reaction time is ${reactionTime} milliseconds.`);
            document.getElementById('reactionTime').style.display = 'none';
        }
        function startMemoryChallenge() {
            const sequence = [1, 2, 3, 4, 5]; // This can be randomized
            let userSequence = [];
            alert("Memorize this sequence: " + sequence.join(', '));
            setTimeout(() => {
                let userInput = prompt("Enter the sequence: (e.g. 1,2,3,4,5)");
                userSequence = userInput.split(',').map(Number);
                if (JSON.stringify(sequence) === JSON.stringify(userSequence)) {
                    alert("Correct!");
                } else {
                    alert("Wrong! The correct sequence was " + sequence.join(', '));
                }
            }, 5000);
        }
    </script>
</head>
<body>
    <h1>Welcome to the Human Benchmark Game</h1>
    <div id="game">
        <button id="startBtn" onclick="startReactionTest()">Start Reaction Test</button>
        <div id="reactionTime" style="display: none;" onclick="recordReaction()"></div>
        <button onclick="startMemoryChallenge()">Start Memory Challenge</button>
    </div>
</body>
</html>
