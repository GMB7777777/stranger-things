<!DOCTYPE html>
<html>
<head>
    <title>Color Objects</title>
    <style>
        body {
            background-color: rgb(200,100,50); 
        }
        .color-box {
            border: 2px solid #000;
            padding: 20px;
            margin: 10px;
            display: inline-block;
        }
        .pink {
            background-color: rgb(200,50,50);
            
        }
        .blue {
            background-color: rgb(255,255,150);
        }
        .gray {
            background-color: rgb(200,200,200);
        }
        .brown {
            background-color: rgb(200,100,0); 
        }
    </style>
</head>
<body>
    <div class="color-box pink">Beautiful Pink</div>
    <div class="color-box blue">Cool Blue</div>
    <div class="color-box gray">Dark Gray</div>
    <div class="color-box brown">Chocolate Brown</div>
</body>
</html>
